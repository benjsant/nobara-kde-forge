# Pre-commit hooks pour NobaraForgeKDE
# Install : uv tool install pre-commit && pre-commit install
# Run manuellement sur tout le repo : pre-commit run --all-files
#
# Documentation : https://pre-commit.com/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Ruff : lint + (optionnel) format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      # Format desactive par defaut (genere bcp de diff cosmetique).
      # Decommentez la ligne suivante pour activer le format automatique :
      # - id: ruff-format

  # Bash syntax check sur les .sh
  - repo: https://github.com/openstack/bashate
    rev: 2.1.1
    hooks:
      - id: bashate
        args: ['-i', 'E006']  # ignore line-too-long, on tolere les commentaires longs

  # Validation Pydantic locale des configs JSON
  - repo: local
    hooks:
      - id: validate-profiles
        name: Validate profiles Pydantic schemas
        entry: bash -c 'uv run --group dev pytest tests/test_schemas.py -q'
        language: system
        pass_filenames: false
        files: ^(configs/.*\.json|schemas/.*\.py|tests/test_schemas\.py)$
