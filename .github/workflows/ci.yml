name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (incl. dev)
        run: uv sync --group dev

      - name: Compile-check all Python sources
        run: |
          uv run python -m compileall -q routes scripts utils schemas tests
          uv run python -m py_compile web_app.py nobara_kde_forge.py

      - name: Run pytest
        run: uv run --group dev pytest tests/ -v

      - name: Bash launcher syntax check
        run: bash -n nobaraforgeKDE.sh

      - name: Validate JSON configs
        run: |
          uv run python -c "
          import json, sys
          from pathlib import Path
          for p in Path('configs').rglob('*.json'):
              try:
                  json.loads(p.read_text())
              except Exception as e:
                  print(f'INVALID: {p}: {e}'); sys.exit(1)
          print('All JSON configs valid.')
          "
